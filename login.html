<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | My Website</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .secure-badge { background: #28a745; color: white; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; margin-bottom: 1rem; display: inline-block; }
        h2 { margin-bottom: 1.5rem; color: #333; }
        input { width: 100%; padding: 1rem; margin: 0.75rem 0; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .error { color: #dc3545; margin-top: 0.5rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="secure-badge">🔒 HTTPS Protected</div>
        <h2>Login to Dashboard</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <div id="error" class="error"></div>
            <button type="submit">Sign In</button>
        </form>
    </div>
    <script>
        const users = {'user@example.com': 'password123', 'admin@example.com': 'adminpass'};
        document.getElementById('loginForm').onsubmit = e => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const err = document.getElementById('error');
            if (users[email] && users[email] === pass) {
                localStorage.setItem('loggedInUser', email);
                window.location.href = email.includes('admin') ? 'admin.html' : 'index.html';
            } else {
                err.textContent = 'Invalid email or password.';
            }
        };
    </script>
</body>
</html>
